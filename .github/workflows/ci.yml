name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.21'
  # Let corepack download the packageManager-pinned npm without an interactive prompt.
  COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      affected-apps: ${{ steps.affected.outputs.apps }}
      affected-libs: ${{ steps.affected.outputs.libs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Enable corepack (use packageManager-pinned npm)
        run: corepack enable

      - name: Install dependencies
        run: npm ci

      - name: Derive affected base/head SHAs
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: main

      - name: Get affected projects
        id: affected
        run: |
          echo "apps=$(npx nx show projects --affected --type app --json)" >> $GITHUB_OUTPUT
          echo "libs=$(npx nx show projects --affected --type lib --json)" >> $GITHUB_OUTPUT

  lint-and-test:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        project: ['api', 'web', 'mobile', 'api-interfaces']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Enable corepack (use packageManager-pinned npm)
        run: corepack enable

      - name: Install dependencies
        run: npm ci

      - name: Lint ${{ matrix.project }}
        run: npx nx lint ${{ matrix.project }}

      - name: Test ${{ matrix.project }}
        run: npx nx test ${{ matrix.project }} --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          directory: ./coverage/${{ matrix.project }}
          flags: ${{ matrix.project }}

  build-typescript:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        app: ['api', 'web']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Enable corepack (use packageManager-pinned npm)
        run: corepack enable

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.app }}
        run: npx nx build ${{ matrix.app }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-build
          path: dist/apps/${{ matrix.app }}
          retention-days: 7

  build-go:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ['device-controller', 'data-pusher']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Make
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Build ${{ matrix.app }}
        run: |
          cd apps/${{ matrix.app }}
          make build
          make test

      - name: Build ARM64
        run: |
          cd apps/${{ matrix.app }}
          make build-arm

      - name: Upload Go artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-build
          path: apps/${{ matrix.app }}/dist/
          retention-days: 7

  validate-infrastructure:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.9'
          # The default setup-terraform wrapper intercepts stdin, which hangs
          # `terraform fmt -` (used by bootstrap.test.sh to validate emitted HCL).
          # No step here consumes the wrapper's outputs, so disable it.
          terraform_wrapper: false

      - name: Terraform Format Check
        run: |
          cd apps/infrastructure
          terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          cd apps/infrastructure
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd apps/infrastructure
          terraform validate

      - name: Static checks (V2 invariants)
        run: apps/infrastructure/scripts/tf-static-checks.sh

      - name: Bootstrap safety + emitted-HCL tests
        # `< /dev/null` so nothing in the suite can block on the runner's stdin;
        # `timeout` bounds any future hang instead of wedging the job.
        run: timeout 180 bash apps/infrastructure/bootstrap/bootstrap.test.sh < /dev/null

      # Validate the native-OTLP collector config (MG-33 F1/F3) against the SAME
      # PINNED contrib image the config comments/Terraform pin. otlphttp +
      # azureauth + file_storage require the contrib distribution; azureauth
      # first ships in contrib 0.126.0. Dummy env values satisfy the exporter's
      # non-empty-endpoint check — validate is a static config check, it opens no
      # network connection and ingests nothing. Exit 1 on any config error.
      - name: Validate OTel Collector config (pinned contrib image)
        env:
          OTELCOL_CONTRIB_IMAGE: otel/opentelemetry-collector-contrib:0.128.0
          AZURE_OTLP_UAI_CLIENT_ID: 00000000-0000-0000-0000-000000000000
          AZURE_MONITOR_OTLP_ENDPOINT: https://example-dce.ingest.monitor.azure.com
          AZURE_MONITOR_DCR_IMMUTABLE_ID: dcr-00000000000000000000000000000000
          AZURE_MONITOR_STREAM_NAME: Custom-OtelTraces
        run: |
          docker run --rm \
            -v "$PWD/apps/infrastructure/otel-collector:/cfg:ro" \
            -e AZURE_OTLP_UAI_CLIENT_ID \
            -e AZURE_MONITOR_OTLP_ENDPOINT \
            -e AZURE_MONITOR_DCR_IMMUTABLE_ID \
            -e AZURE_MONITOR_STREAM_NAME \
            "$OTELCOL_CONTRIB_IMAGE" \
            validate --config=/cfg/collector-config.yaml

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Enable corepack (use packageManager-pinned npm)
        run: corepack enable

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

  # PLAN-ONLY gate on the develop branch.
  #
  # This job used to unconditionally deploy infrastructure and then push the
  # app + web bundles. Against the V2 GREENFIELD stack that is a landmine: the
  # deploy runs against empty, ephemeral local state and would try to CREATE
  # all dev infrastructure inside CI, and the app/web deploy steps would target
  # infrastructure that does not exist. Per the MG-24 hard safety rule
  # (never apply against ephemeral local state; never create Azure resources
  # from CI) the job is now plan-only and ends at `terraform plan`, consistent
  # with the prod infra workflow. The live greenfield dev plan/apply is the
  # operator's out-of-pipeline acceptance step (see the bootstrap runbook);
  # app/web deploys are owned by the dedicated deploy workflows.
  #
  # MG-24 corrective: the plan is now bound to the PERSISTENT dev remote-state
  # backend (not `-backend=false`), so it is a meaningful drift/plan gate against
  # real state POST-BOOTSTRAP. Until the operator has stood up that backend and
  # flipped the DEV_TF_BACKEND_READY switch, the job is SKIPPED (skip-clean, not
  # expected-red): a backend-bound init against a non-existent state container
  # would fail with "Backend initialization required" — the exact failure the
  # first pass shipped. The gate makes the transition operator-controlled.
  deploy-dev:
    if: github.ref == 'refs/heads/develop' && vars.DEV_TF_BACKEND_READY == 'true'
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-typescript, build-go, validate-infrastructure]
    environment: development
    # OIDC: authenticate to Azure via the GitHub-Environment-scoped federated
    # credential (subject `environment:development`), NOT the retired long-lived
    # AZURE_CREDENTIALS service-principal secret. Because these are GitHub
    # Environment variables bound to `development`, they resolve to a SEPARATE
    # federated identity from prod's `environment:production` — no shared SP, no
    # whole-state access. `id-token: write` lets azure/login mint the short-lived
    # OIDC token; `contents: read` is for checkout.
    permissions:
      id-token: write
      contents: read
    env:
      # From the authenticated OIDC context (a per-env GitHub Environment
      # variable), never a hardcoded literal.
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.9'

      - name: Plan Infrastructure (plan-only — no apply)
        run: |
          cd apps/infrastructure
          # Bind the PERSISTENT dev remote-state backend (MG-24 corrective). The
          # state-account name is derived ONCE from the subscription id by the
          # shared helper and injected as an extra -backend-config, so this init
          # can never drift from the hcl's literal (there is none). ARM_SUBSCRIPTION_ID
          # is already exported (job env) — the azurerm backend reads it, and
          # `az account set` alone would NOT satisfy AzureRM v4.
          STATE_ACCOUNT="$(scripts/state-account-name.sh "$ARM_SUBSCRIPTION_ID")"
          terraform init -reconfigure \
            -backend-config=environments/backend-dev.hcl \
            -backend-config="storage_account_name=$STATE_ACCOUNT"
          terraform plan -var-file=environments/dev.tfvars

name: Deploy Prod App

# Prod is API-only — no web/Static-Web-Apps deploy (that's dev-only).
#
# Trigger model (MG-21, Option A): this workflow runs ONLY after the "CI/CD
# Pipeline" workflow completes. There is no push trigger and no workflow_dispatch
# — prod deploys are gated on a green CI run of a push to main, plus the
# vars.PROD_DEPLOY_ENABLED operator switch. A stale-SHA guard ensures we never
# deploy a commit that main has already advanced past.
on:
  workflow_run:
    workflows: ['CI/CD Pipeline']
    types: [completed]

# OIDC: this workflow authenticates to Azure via a GitHub-Environment-scoped
# federated credential (subject `environment:production`), NOT the retired
# long-lived AZURE_CREDENTIALS_PROD service-principal secret. `id-token: write`
# lets azure/login mint the short-lived OIDC token; `contents: read` is for
# checkout.
permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '24'
  # Let corepack download the packageManager-pinned npm without an interactive prompt.
  COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
  FUNC_CORE_TOOLS_VERSION: '4.12.1'

concurrency:
  group: app-deploy-prod-production
  cancel-in-progress: false

jobs:
  deploy-api:
    # Deploy only when the triggering CI run: succeeded, was a push (not a PR),
    # targeted main, AND the operator has flipped the PROD_DEPLOY_ENABLED switch.
    #
    # MG-25 PREREQUISITE (must exist BEFORE PROD_DEPLOY_ENABLED is set to 'true'):
    # this job authenticates as the PROD app-deployment identity
    # (vars.AZURE_APP_DEPLOY_CLIENT_ID for the production environment) with its
    # `Website Contributor` role scoped to the prod Function App. MG-24 provisions
    # ONLY the *dev* app-deployment identity (bootstrap.sh); the prod counterpart
    # + its role assignment are an MG-25 deliverable and are NOT provisioned by
    # this repo. Enabling PROD_DEPLOY_ENABLED before MG-25 has created that prod
    # identity+role will make the azure/login step below fail closed (no valid
    # OIDC federation / insufficient rights) rather than deploy — intended: the
    # switch must not be flipped until the prerequisite is in place.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      vars.PROD_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      # ARM_SUBSCRIPTION_ID comes from the authenticated OIDC context (published
      # as a GitHub Environment variable), never a hardcoded literal. Terraform's
      # azurerm backend/provider reads it from the env when resolving the
      # function_app_name output below.
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    steps:
      - name: Stale-SHA guard (deploy only the current main tip)
        id: freshness
        env:
          GH_TOKEN: ${{ github.token }}
          CI_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          CURRENT_TIP=$(gh api "repos/${{ github.repository }}/commits/main" --jq .sha)
          echo "CI'd commit:   $CI_SHA"
          echo "Current main:  $CURRENT_TIP"
          if [ "$CI_SHA" = "$CURRENT_TIP" ]; then
            echo "fresh=true" >> "$GITHUB_OUTPUT"
            echo "Head SHA is the current main tip — proceeding."
          else
            echo "fresh=false" >> "$GITHUB_OUTPUT"
            echo "main has advanced past the CI'd commit — skipping deploy (not a failure)."
          fi

      - name: Checkout the CI'd commit
        if: steps.freshness.outputs.fresh == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        if: steps.freshness.outputs.fresh == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Enable corepack (use packageManager-pinned npm)
        if: steps.freshness.outputs.fresh == 'true'
        run: corepack enable

      - name: Install dependencies
        if: steps.freshness.outputs.fresh == 'true'
        run: npm ci

      - name: Build api
        if: steps.freshness.outputs.fresh == 'true'
        run: npx nx build api

      - name: Verify Functions package
        if: steps.freshness.outputs.fresh == 'true'
        run: node apps/api/tools/verify-func-package.js dist/apps/api

      - name: Pin Azure Functions Core Tools
        if: steps.freshness.outputs.fresh == 'true'
        run: npm i -g azure-functions-core-tools@${{ env.FUNC_CORE_TOOLS_VERSION }}

      # APP DEPLOYMENT identity (MG-24 two-identity model). Function-App publish is
      # a data-plane action a Reader/plan identity cannot perform, so this login
      # uses the SEPARATE least-privilege APP-DEPLOYMENT identity
      # (AZURE_APP_DEPLOY_CLIENT_ID: Website Contributor scoped to the Function App
      # only), NOT the plan/read identity (AZURE_CLIENT_ID: Reader + state).
      #
      # This workflow only CONSUMES vars.AZURE_APP_DEPLOY_CLIENT_ID — it does NOT
      # provision it. For PRODUCTION that identity + its `Website Contributor` role
      # assignment are an MG-25 prerequisite (MG-24's bootstrap.sh provisions the
      # DEV app-deployment identity only, and explicitly documents the prod one as
      # a deferred MG-25 gap). It must exist before PROD_DEPLOY_ENABLED is enabled;
      # until then this login fails closed rather than deploying with a wrong role.
      - name: Azure login (OIDC — app deployment identity)
        if: steps.freshness.outputs.fresh == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_APP_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        if: steps.freshness.outputs.fresh == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.9'

      # Single source of truth for the Function App name: read it straight from
      # the Terraform `function_app_name` output rather than reconstructing the
      # name here. Bind the per-env remote backend (prod state key
      # meatgeek-v2/prod.tfstate) at init so a Terraform naming change can never
      # desync the publish target.
      - name: Resolve Function App name (Terraform output)
        id: tfout
        if: steps.freshness.outputs.fresh == 'true'
        run: |
          cd apps/infrastructure
          # Bind the per-env remote backend (prod state key meatgeek-v2/prod.tfstate)
          # to read the function_app_name output. The state-account name is derived
          # ONCE from the subscription id by the shared helper and injected as an
          # extra -backend-config (single source, no literal in the hcl).
          STATE_ACCOUNT="$(scripts/state-account-name.sh "$ARM_SUBSCRIPTION_ID")"
          terraform init -reconfigure \
            -backend-config=environments/backend-prod.hcl \
            -backend-config="storage_account_name=$STATE_ACCOUNT"
          NAME=$(terraform output -raw function_app_name)
          if [ -z "$NAME" ]; then
            echo "function_app_name Terraform output was empty — aborting deploy." >&2
            exit 1
          fi
          echo "function_app_name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Resolved Function App name from Terraform: $NAME"

      # Authoritative gate. main can advance during the multi-minute build, so the
      # early guard alone leaves a TOCTOU window wide enough to ship a superseded
      # commit. Re-query the main tip here, at the last possible moment, so the
      # check-to-deploy window shrinks to the deploy command's own runtime.
      - name: Re-verify main tip (final freshness gate before deploy)
        id: freshness_final
        if: steps.freshness.outputs.fresh == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CI_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          CURRENT_TIP=$(gh api "repos/${{ github.repository }}/commits/main" --jq .sha)
          echo "CI'd commit:   $CI_SHA"
          echo "Current main:  $CURRENT_TIP"
          if [ "$CI_SHA" = "$CURRENT_TIP" ]; then
            echo "fresh=true" >> "$GITHUB_OUTPUT"
            echo "Still the current main tip — deploying."
          else
            echo "fresh=false" >> "$GITHUB_OUTPUT"
            echo "main advanced during the build — skipping deploy (not a failure)."
          fi

      - name: Deploy to Production
        if: steps.freshness.outputs.fresh == 'true' && steps.freshness_final.outputs.fresh == 'true'
        # Publish to the exact Function App name Terraform owns — passed through to
        # the Nx `deploy` target's `{args.functionApp}` interpolation. No hardcoded
        # Function App name survives anywhere in the deploy path.
        run: npx nx deploy api --functionApp='${{ steps.tfout.outputs.function_app_name }}'

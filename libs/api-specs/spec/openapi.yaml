openapi: 3.0.3

info:
  title: MeatGeek V2 API
  version: 0.1.0
  description: |
    OpenAPI source-of-truth for the MeatGeek V2 platform. Covers the Phase-1
    HTTP surface (cooks, temperatures, devices) plus the SignalR message
    payloads used for real-time push.

    ## SignalR transport note

    The schemas under `components/schemas/signalr-payloads.yaml`
    (TemperatureUpdateMessage, CookStartedMessage, etc.) describe SignalR
    message payloads, NOT HTTP endpoints; transport is the SignalR
    `temperatureHub` channel. Clients connect to that hub and receive
    messages whose envelope matches `SignalRMessage` (a discriminated union
    keyed on the `type` field). Every envelope MUST carry `correlation.id`
    so producers and consumers can stitch a single user action through
    device → IoT Hub → Functions → SignalR → client traces.

    ## Source-of-truth note

    Routes for the six currently-implemented HTTP endpoints
    (GET /cooks, POST /cooks, POST /cooks/{cookId}/stop,
    POST /negotiate, GET /temperatures/current/{deviceId},
    GET /devices) match `apps/api/src/main.ts` route templates
    character-for-character — these are the contract. Endpoints whose
    description starts with `NOT YET IMPLEMENTED -` represent the planned
    Phase-1/Phase-2 surface; handlers will follow.

  contact:
    name: MeatGeek V2 team
    url: https://github.com/your-org/meatgeekv2
  license:
    name: UNLICENSED

servers:
  - url: http://localhost:7071/api
    description: Local Azure Functions Core Tools (default).
  - url: http://localhost:4010
    description: Local mock server (libs/api-specs mock-server).

tags:
  - name: cooks
    description: Cook session CRUD and lifecycle.
  - name: temperatures
    description: Live and historical temperature readings.
  - name: devices
    description: BBQ device registration, configuration, and status.

paths:
  /cooks:
    $ref: './paths/cooks.yaml#/cooks-collection'
  /cooks/{id}:
    $ref: './paths/cooks.yaml#/cook-item'
  /cooks/{id}/start:
    $ref: './paths/cooks.yaml#/cook-start'
  # Shipped route (apps/api/src/main.ts): cooks/{cookId}/stop — path
  # template var matches the cook-stop operation's `cookId` path param.
  # The planned {id} routes above will align their param name when implemented.
  /cooks/{cookId}/stop:
    $ref: './paths/cooks.yaml#/cook-stop'
  /cooks/{id}/history:
    $ref: './paths/cooks.yaml#/cook-history'
  # Shipped route (apps/api/src/main.ts): route 'negotiate', POST — SignalR
  # handshake handled by apps/api/src/functions/signalr/negotiate.ts.
  /negotiate:
    $ref: './paths/negotiate.yaml#/negotiate'
  /temperatures/current/{deviceId}:
    $ref: './paths/temperatures.yaml#/temperatures-current'
  /temperatures/history:
    $ref: './paths/temperatures.yaml#/temperatures-history'
  /devices:
    $ref: './paths/devices.yaml#/devices-collection'
  /devices/{id}:
    $ref: './paths/devices.yaml#/device-item'


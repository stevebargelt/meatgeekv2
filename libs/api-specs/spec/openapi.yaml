      $ref: './components/schemas/common.yaml#/TemperatureUnit'
    ConnectionStatus:
      $ref: './components/schemas/common.yaml#/ConnectionStatus'
    ISODateTime:
      $ref: './components/schemas/common.yaml#/ISODateTime'

    # Cook
    CookStatus:
      $ref: './components/schemas/cook.yaml#/CookStatus'
    TargetTemperatures:
      $ref: './components/schemas/cook.yaml#/TargetTemperatures'
    Cook:
      $ref: './components/schemas/cook.yaml#/Cook'
    StartCookRequest:
      $ref: './components/schemas/cook.yaml#/StartCookRequest'
    UpdateCookRequest:
      $ref: './components/schemas/cook.yaml#/UpdateCookRequest'
    CookListResponse:
      $ref: './components/schemas/cook.yaml#/CookListResponse'
    CookSummary:
      $ref: './components/schemas/cook.yaml#/CookSummary'

    # Temperature
    TemperatureReading:
      $ref: './components/schemas/temperature.yaml#/TemperatureReading'
    TemperatureHistoryResponse:
      $ref: './components/schemas/temperature.yaml#/TemperatureHistoryResponse'
    TemperatureAlertType:
      $ref: './components/schemas/temperature.yaml#/TemperatureAlertType'
    ProbeName:
      $ref: './components/schemas/temperature.yaml#/ProbeName'
    TemperatureAlert:
      $ref: './components/schemas/temperature.yaml#/TemperatureAlert'
    LiveTemperatureUpdate:
      $ref: './components/schemas/temperature.yaml#/LiveTemperatureUpdate'

    # Device
    Device:
      $ref: './components/schemas/device.yaml#/Device'
    DeviceConfiguration:
      $ref: './components/schemas/device.yaml#/DeviceConfiguration'
    DeviceListResponse:
      $ref: './components/schemas/device.yaml#/DeviceListResponse'
    UpdateDeviceRequest:
      $ref: './components/schemas/device.yaml#/UpdateDeviceRequest'
    DeviceStatus:
      $ref: './components/schemas/device.yaml#/DeviceStatus'

    # SignalR payloads — message envelopes for the temperatureHub channel,
    # not HTTP endpoints. See info.description for the transport note.
    SignalRConnectionInfo:
      $ref: './components/schemas/signalr-payloads.yaml#/SignalRConnectionInfo'
    SignalRMessageType:
      $ref: './components/schemas/signalr-payloads.yaml#/SignalRMessageType'
    CorrelationContext:

    CookPausedMessage:
      $ref: './components/schemas/signalr-payloads.yaml#/CookPausedMessage'
    CookResumedMessage:
      $ref: './components/schemas/signalr-payloads.yaml#/CookResumedMessage'
    DeviceOnlineMessage:
      $ref: './components/schemas/signalr-payloads.yaml#/DeviceOnlineMessage'
    DeviceOfflineMessage:

# MeatGeek OTel Collector configuration — NATIVE Azure Monitor OTLP path.
#
# STATUS (MG-33 F1/F3): AUTHORED + STATIC-VALIDATED ONLY. This config is NOT yet
# proven operational — live Go-span-to-App-Insights proof is gated on MG-34
# (secure off-VNet edge ingress) + MG-24 (Container Apps env) + MG-25 (native
# OTLP preview acceptance in the target region). Do not read a green
# `otelcol-contrib validate` as "telemetry flows".
#
# Purpose: the Go edge services (device-controller, data-pusher) export OTLP to
# THIS collector; the collector forwards to Azure Monitor via the OUTBOUND
# native-OTLP path — otlphttp -> a full native-OTLP traces ingestion URL on a
# Data Collection Endpoint (DCE) -> a native-OTLP Data Collection Rule (DCR,
# Microsoft-OTel-Traces-* streams) -> workspace-based App Insights trace tables.
# This REPLACES the previous `azuremonitor` (Breeze) exporter (MG-33: correct
# native OTLP export, per operator decision 2026-07-22).
#
# Auth is Entra-only: the collector runs as an Azure Container App with a
# USER-ASSIGNED managed identity that holds "Monitoring Metrics Publisher" ON
# THE DCR (see the Terraform in ../ — enable_native_otlp module). The azure_auth
# extension mints an AAD token for the EXPLICITLY-CONFIGURED scope
# https://monitor.azure.com/.default — NO ingestion key, NO connection string.
#
# EVERY Azure-specific value (the full traces_endpoint URL, UAI client id,
# file-storage dir) is injected at runtime via env-var substitution from
# Terraform outputs — NEVER hand-copied into this file. See README.md.
#
# PINNED IMAGE (F3): otel/opentelemetry-collector-contrib:0.151.0
#   otlphttp + azure_auth + file_storage all require the CONTRIB distribution.
#   Version floor (DOC-VERIFIED, 3rd review): >=0.132.0 (native OTLP), >=0.148.0
#   (current `azure_auth` config syntax), AND >0.150.0 so it is OUTSIDE the
#   GHSA-pjv4-3c63-699f azure_auth inbound-auth-bypass advisory range
#   (0.124.0–0.150.0). Outbound (exporter) auth used HERE is unaffected by that
#   advisory, but MG-34's FUTURE collector RECEIVER (inbound) auth must NOT run on
#   a version where azure_auth accepts unauthenticated inbound requests — the
#   0.151.0 pin enforces that. Pin by tag AND @sha256 digest (Terraform variable
#   collector_image); re-confirm the digest and the advisory `patched` field at
#   deploy. The core `otel/opentelemetry-collector` image does NOT include these.
#
#   DOC-VERIFIED, OPERATIONALLY UNVERIFIED: shapes below are reconciled against MS
#   primary sources (MS Learn native-OTLP ingestion doc, AzureMonitorCommunity
#   OTLP_DCE_DCR ARM template, azureauthextension README, advisory
#   GHSA-pjv4-3c63-699f), but NO live span has reached App Insights. Do not read a
#   green `otelcol-contrib validate` as "telemetry flows" (MG-25/MG-34).

extensions:
  # Entra (AAD) authenticator — extension key `azure_auth` (CURRENT name; the old
  # `azureauth` key is renamed as of contrib >=0.148.0). Uses the Container App's
  # USER-ASSIGNED managed identity (client id from env, Terraform-emitted).
  # System-assigned would create a create-then-grant ordering gap, so the identity
  # is user-assigned.
  #
  # DOC-VERIFIED (azureauthextension README): the ingestion scope MUST be set
  # EXPLICITLY via `scopes:` — it is NOT derived from the request Host (the prior
  # assumption was WRONG; the extension pins the audience from config). The Azure
  # Monitor ingestion audience is https://monitor.azure.com/.default.
  azure_auth:
    managed_identity:
      client_id: ${env:AZURE_OTLP_UAI_CLIENT_ID}
    scopes:
      - https://monitor.azure.com/.default

  # Persistent (WAL) spool so telemetry survives a collector restart instead of
  # being lost from the in-memory queue. MUST be backed by a persistent volume
  # on the Container App — an ephemeral overlay defeats the durability intent.
  file_storage/otlp_queue:
    directory: /var/lib/otelcol/file_storage
    # Create the spool dir on startup if the mounted volume is empty (first boot).
    create_directory: true
    timeout: 10s

receivers:
  # OTLP receiver — bound to LOOPBACK ONLY (fail-closed boundary, MG-33/MG-34).
  # The edge devices are OFF Azure's VNet and CANNOT reach this yet BY DESIGN:
  # there is deliberately NO public OTLP listener and NO external ingress here.
  # Secure off-VNet ingress (mTLS / auth-terminating proxy / private tunnel) is
  # the SEPARATE blocking dependency MG-34; until it lands, only in-container
  # senders can reach the receiver. Do NOT change these to 0.0.0.0 without MG-34.
  otlp:
    protocols:
      grpc:
        endpoint: 127.0.0.1:4317
      http:
        endpoint: 127.0.0.1:4318

processors:
  # Bound memory under bursty edge load, then batch to reduce egress calls.
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25
  batch:
    timeout: 5s

exporters:
  # Native OTLP/HTTP to Azure Monitor. The FULL traces ingestion URL — the DCE
  # ingestion host, the DCR immutable id, and the fixed `Microsoft-OTLP-Traces`
  # stream segment — is built in Terraform and injected as a SINGLE env var
  # (never hand-copied). DOC-VERIFIED (MS native-OTLP ingestion doc): routing is
  # carried by the URL PATH, NOT by x-ms-dcr-immutable-id / x-ms-stream-name
  # headers (removed) — so `traces_endpoint` (not a bare `endpoint`) is used and
  # there is no headers block. azure_auth supplies the AAD bearer token for the
  # explicitly-configured https://monitor.azure.com/.default scope.
  #
  # Durability (F3): a PERSISTENT sending_queue backed by file_storage spools to
  # disk (survives restart) + retry_on_failure with backoff for transient 5xx /
  # throttling. max_elapsed_time: 0 => retry indefinitely rather than drop.
  otlphttp/azuremonitor:
    traces_endpoint: ${env:AZURE_MONITOR_OTLP_TRACES_ENDPOINT}
    auth:
      authenticator: azure_auth
    sending_queue:
      enabled: true
      storage: file_storage/otlp_queue
      num_consumers: 2
      queue_size: 1000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 0

service:
  # Both net-new extensions must be listed here or they are not started.
  extensions: [azure_auth, file_storage/otlp_queue]
  pipelines:
    # Traces are the primary signal: the per-reading W3C trace chain (MG-33 /
    # F2/F3) flows edge service -> otlp receiver -> otlphttp/azuremonitor ->
    # DCE/DCR -> workspace OpenTelemetry-schema tables (OTelSpans / OTelTraces).
    #
    # NOTE: metrics are intentionally NOT wired here. The removed `azuremonitor`
    # exporter carried metrics for free; native OTLP ingestion needs its OWN DCR
    # stream + transform for metrics, which is out of scope for F1/F3 (traces).
    # Adding metrics to the trace stream would misroute them. Deferred.
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/azuremonitor]
